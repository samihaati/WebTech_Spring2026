<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AIUB Lab Task 05</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Text Analysis Tool</h2>
        <textarea id="textInput" placeholder="Paste your paragraph here..."></textarea>
        
        <button id="analyzeBtn">Analyze Text</button>

        <div id="resultDisplay" class="result-container">
            <p>Total Characters: <span id="charCount"></span></p>
            <p>Total Words: <span id="wordCount"></span></p>
            <p>Reversed Text: <span id="reversedText"></span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
